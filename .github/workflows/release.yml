name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libpipewire-0.3-dev libdbus-1-dev pkg-config clang libclang-dev llvm-dev

      - name: Set libclang path
        run: echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Build release
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo build --release --locked

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/hyprcrop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
